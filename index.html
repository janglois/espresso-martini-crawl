<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🍸 Espresso Martini Crawl</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0b0e;--card:#1a1720;--accent:#c9a96e;--text:#e8e4ec;--text-dim:#8a8494;--green:#6ecf8e;--green-bg:#6ecf8e18;--red-bg:#cf6e6e18;--border:#2a2633}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px}
.header{text-align:center;padding:50px 20px 20px}
.header h1{font-family:'Playfair Display',serif;font-size:28px;color:var(--accent);letter-spacing:1px}
.header p{color:var(--text-dim);font-size:13px;margin-top:6px;font-weight:300}
.sync-status{text-align:center;font-size:11px;padding:4px;color:var(--green)}
.sync-status.offline{color:#cf6e6e}
.stats-bar{display:flex;justify-content:center;gap:24px;padding:16px 20px;margin:0 16px 8px;background:var(--card);border-radius:14px;border:1px solid var(--border)}
.stat{text-align:center}
.stat-num{font-size:22px;font-weight:600;color:var(--accent);font-family:'Playfair Display',serif}
.stat-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.search-bar{padding:0 16px;margin-bottom:8px}
.search-bar input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.search-bar input::placeholder{color:var(--text-dim)}
.search-bar input:focus{border-color:var(--accent)}
.filters{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s}
.filter-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:500}
.sort-bar{display:flex;gap:8px;padding:8px 16px;align-items:center}
.sort-bar label{font-size:12px;color:var(--text-dim)}
.sort-bar select{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-family:'Inter',sans-serif;outline:none}
.card-list{padding:8px 16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;transition:all .2s;cursor:pointer}
.card:active{transform:scale(0.98)}
.card.visited{border-left:3px solid var(--green)}
.card.not-visited{border-left:3px solid var(--border)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;line-height:1.3}
.card-city{font-size:12px;color:var(--text-dim);margin-top:2px}
.badge{flex-shrink:0;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.badge.been{background:var(--green-bg);color:var(--green)}
.badge.not-been{background:var(--red-bg);color:var(--text-dim)}
.card-stars{margin-top:10px;display:flex;align-items:center;gap:2px}
.star-rating-text{margin-left:8px;font-size:13px;color:var(--text-dim);font-weight:500}
.card-notes{margin-top:10px;font-size:13px;color:var(--text-dim);font-style:italic;line-height:1.5}
.card-notes:empty{display:none}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--accent);margin-bottom:4px}
.modal .modal-city{font-size:13px;color:var(--text-dim);margin-bottom:20px}
.modal-section{margin-bottom:20px}
.modal-section label{display:block;font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.toggle-row{display:flex;align-items:center;gap:12px}
.toggle{width:50px;height:28px;border-radius:14px;background:var(--border);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:white;top:3px;left:3px;transition:transform .2s}
.toggle.on::after{transform:translateX(22px)}
.toggle-label{font-size:14px}
.modal-stars{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.modal-star{font-size:28px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:transform .15s;position:relative;width:34px;text-align:center;display:inline-block}
.modal-star:active{transform:scale(1.2)}
.modal-rating-display{margin-left:8px;font-size:16px;color:var(--accent);font-weight:600}
.half-star-hint{font-size:11px;color:var(--text-dim);margin-top:6px}
textarea{width:100%;min-height:80px;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:'Inter',sans-serif;resize:vertical;outline:none}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--text-dim)}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn{flex:1;padding:14px;border-radius:12px;border:none;font-size:15px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;transition:all .2s}
.btn-save{background:var(--accent);color:var(--bg)}
.btn-save:active{transform:scale(0.97)}
.btn-cancel{background:var(--border);color:var(--text)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-dim)}
.empty-state .emoji{font-size:40px;margin-bottom:12px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--accent);color:var(--bg);padding:12px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:200;transition:transform .3s ease;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="header">
<h1>🍸 Espresso Martini Crawl</h1>
<p>South Bay Edition — Los Gatos to Menlo Park</p>
</div>
<div class="sync-status" id="syncStatus">🔄 Connecting...</div>
<div class="stats-bar">
<div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Spots</div></div>
<div class="stat"><div class="stat-num" id="visitedCount">0</div><div class="stat-label">Visited</div></div>
<div class="stat"><div class="stat-num" id="remainingCount">0</div><div class="stat-label">To Go</div></div>
<div class="stat"><div class="stat-num" id="avgRating">—</div><div class="stat-label">Avg ⭐</div></div>
</div>
<div class="search-bar"><input type="text" id="searchInput" placeholder="Search restaurants or cities..." oninput="render()"></div>
<div class="filters" id="filterBar"></div>
<div class="sort-bar">
<label>Sort:</label>
<select id="sortSelect" onchange="render()">
<option value="city">City</option>
<option value="name">Name</option>
<option value="rating-desc">Rating ↓</option>
<option value="rating-asc">Rating ↑</option>
<option value="visited">Visited First</option>
<option value="not-visited">Not Visited First</option>
</select>
<label style="margin-left:auto">Show:</label>
<select id="showSelect" onchange="render()">
<option value="all">All</option>
<option value="visited">Visited</option>
<option value="not-visited">Not Visited</option>
<option value="rated">Rated</option>
</select>
</div>
<div class="card-list" id="cardList"></div>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
<div class="modal" onclick="event.stopPropagation()">
<div class="modal-handle"></div>
<h2 id="modalName"></h2>
<div class="modal-city" id="modalCity"></div>
<div class="modal-section">
<label>Been There?</label>
<div class="toggle-row">
<div class="toggle" id="modalToggle" onclick="toggleVisited()"></div>
<span class="toggle-label" id="modalToggleLabel">Not yet</span>
</div>
</div>
<div class="modal-section">
<label>Rating</label>
<div class="modal-stars" id="modalStars"></div>
<div class="half-star-hint">Tap left half of star = .5 | Tap right half = full</div>
</div>
<div class="modal-section">
<label>Notes</label>
<textarea id="modalNotes" placeholder="How was it? Flavor notes, vibes, would you go back?"></textarea>
</div>
<div class="modal-actions">
<button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
<button class="btn btn-save" onclick="saveModal()">Save 🍸</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>

var restaurants = [];
var currentEditId = null;
var modalRating = 0;
var activeCity = "All";
function init() {
restaurantsRef.on("value", function(snapshot) {
var data = snapshot.val();
if (data) {
restaurants = Object.values(data);
var existingIds = {};
for (var i = 0; i < restaurants.length; i++) existingIds[restaurants[i].id] = true;
for (var j = 0; j < DEFAULT_RESTAURANTS.length; j++) {
var d = DEFAULT_RESTAURANTS[j];
if (!existingIds[d.id]) {
restaurants.push(JSON.parse(JSON.stringify(d)));
restaurantsRef.child(String(d.id)).set(d);
}
}
} else {
restaurants = [];
var obj = {};
for (var k = 0; k < DEFAULT_RESTAURANTS.length; k++) {
var r = DEFAULT_RESTAURANTS[k];
restaurants.push(JSON.parse(JSON.stringify(r)));
obj[r.id] = r;
}
restaurantsRef.set(obj);
}
document.getElementById("syncStatus").textContent = "✅ Live synced";
document.getElementById("syncStatus").className = "sync-status";
buildFilters();
render();
}, function(error) {
document.getElementById("syncStatus").textContent = "❌ Sync error: " + error.message;
document.getElementById("syncStatus").className = "sync-status offline";
});
}
function saveToFirebase(restaurant) {
restaurantsRef.child(String(restaurant.id)).update({
visited: restaurant.visited,
rating: restaurant.rating,
notes: restaurant.notes
});
}
function buildFilters() {
var citySet = {};
for (var i = 0; i < restaurants.length; i++) citySet[restaurants[i].city] = true;
var cities = ["All"].concat(Object.keys(citySet).sort());
var html = "";
for (var j = 0; j < cities.length; j++) {
var c = cities[j];
var cls = c === activeCity ? "filter-btn active" : "filter-btn";
html += '<button class="' + cls + '" onclick="setFilter(\'' + c.replace(/'/g, "\\'") + '\')">' + c + '</button>';
}
document.getElementById("filterBar").innerHTML = html;
}
function setFilter(city) { activeCity = city; buildFilters(); render(); }
function getFiltered() {
var list = restaurants.slice();
var search = document.getElementById("searchInput").value.toLowerCase();
var show = document.getElementById("showSelect").value;
if (activeCity !== "All") list = list.filter(function(r) { return r.city === activeCity; });
if (search) list = list.filter(function(r) { return r.name.toLowerCase().indexOf(search) !== -1 || r.city.toLowerCase().indexOf(search) !== -1; });
if (show === "visited") list = list.filter(function(r) { return r.visited; });
if (show === "not-visited") list = list.filter(function(r) { return !r.visited; });
if (show === "rated") list = list.filter(function(r) { return r.rating > 0; });
var sort = document.getElementById("sortSelect").value;
list.sort(function(a, b) {
switch(sort) {
case "name": return a.name.localeCompare(b.name);
case "city": return a.city.localeCompare(b.city) || a.name.localeCompare(b.name);
case "rating-desc": return (b.rating||0)-(a.rating||0)||a.name.localeCompare(b.name);
case "rating-asc": return (a.rating||0)-(b.rating||0)||a.name.localeCompare(b.name);
case "visited": return (b.visited?1:0)-(a.visited?1:0);
case "not-visited": return (a.visited?1:0)-(b.visited?1:0);
default: return 0;
}
});
return list;
}
function renderStarsHTML(rating) {
var h = "";
for (var i = 1; i <= 5; i++) {
if (rating >= i) h += "⭐";
else if (rating >= i - 0.5) h += "🌟";
else h += '<span style="opacity:0.25">☆</span>';
}
return h;
}
function render() {
var list = getFiltered();
var c = document.getElementById("cardList");
if (!list.length) {
c.innerHTML = '<div class="empty-state"><div class="emoji">🔍</div><p>No spots match your filters</p></div>';
} else {
var html = "";
for (var i = 0; i < list.length; i++) {
var r = list[i];
html += '<div class="card ' + (r.visited?"visited":"not-visited") + '" onclick="openModal(' + r.id + ')">';
html += '<div class="card-top"><div>';
html += '<div class="card-name">' + r.name + '</div>';
html += '<div class="card-city">📍 ' + r.city + ', CA</div>';
html += '</div>';
html += '<span class="badge ' + (r.visited?"been":"not-been") + '">' + (r.visited?"✓ Been":"Go Next") + '</span>';
html += '</div>';
html += '<div class="card-stars">';
html += r.rating > 0 ? renderStarsHTML(r.rating) + '<span class="star-rating-text">' + r.rating + '/5</span>' : '<span style="color:var(--text-dim);font-size:13px">Not rated yet</span>';
html += '</div>';
html += '<div class="card-notes">' + (r.notes ? '&ldquo;' + r.notes + '&rdquo;' : '') + '</div>';
html += '</div>';
}
c.innerHTML = html;
}
var visited = restaurants.filter(function(r){return r.visited;});
var rated = restaurants.filter(function(r){return r.rating>0;});
document.getElementById("totalCount").textContent = restaurants.length;
document.getElementById("visitedCount").textContent = visited.length;
document.getElementById("remainingCount").textContent = restaurants.length - visited.length;
if (rated.length) {
var sum = 0;
for (var j = 0; j < rated.length; j++) sum += rated[j].rating;
document.getElementById("avgRating").textContent = (sum/rated.length).toFixed(1);
} else {
document.getElementById("avgRating").textContent = "—";
}
}
function openModal(id) {
currentEditId = id;
var r = null;
for (var i = 0; i < restaurants.length; i++) { if (restaurants[i].id === id) { r = restaurants[i]; break; } }
if (!r) return;
document.getElementById("modalName").textContent = r.name;
document.getElementById("modalCity").textContent = "📍 " + r.city + ", CA";
document.getElementById("modalNotes").value = r.notes || "";
var toggle = document.getElementById("modalToggle");
var label = document.getElementById("modalToggleLabel");
if (r.visited) { toggle.classList.add("on"); label.textContent = "Been there! 🍸"; }
else { toggle.classList.remove("on"); label.textContent = "Not yet"; }
modalRating = r.rating || 0;
renderModalStars();
document.getElementById("modalOverlay").classList.add("open");
document.body.style.overflow = "hidden";
}
function closeModal(e) {
if (e && e.target !== document.getElementById("modalOverlay")) return;
document.getElementById("modalOverlay").classList.remove("open");
document.body.style.overflow = "";
currentEditId = null;
}
function toggleVisited() {
var toggle = document.getElementById("modalToggle");
var label = document.getElementById("modalToggleLabel");
toggle.classList.toggle("on");
if (toggle.classList.contains("on")) label.textContent = "Been there! 🍸";
else label.textContent = "Not yet";
}
function renderModalStars() {
var container = document.getElementById("modalStars");
var html = "";
for (var i = 1; i <= 5; i++) {
var icon;
if (modalRating >= i) icon = "⭐";
else if (modalRating >= i - 0.5) icon = "🌟";
else icon = "☆";
html += '<span class="modal-star" data-star="' + i + '" onclick="handleStarClick(event,' + i + ')">' + icon + '</span>';
}
html += '<span class="modal-rating-display">' + (modalRating > 0 ? modalRating + "/5" : "") + '</span>';
container.innerHTML = html;
}
function handleStarClick(e, starNum) {
var rect = e.currentTarget.getBoundingClientRect();
var clickX = e.clientX || (e.touches && e.touches[0].clientX) || rect.left;
var midpoint = rect.left + rect.width / 2;
if (clickX < midpoint) modalRating = starNum - 0.5;
else modalRating = starNum;
renderModalStars();
}
function saveModal() {
var r = null;
for (var i = 0; i < restaurants.length; i++) { if (restaurants[i].id === currentEditId) { r = restaurants[i]; break; } }
if (!r) return;
r.visited = document.getElementById("modalToggle").classList.contains("on");
r.rating = modalRating;
r.notes = document.getElementById("modalNotes").value.trim();
saveToFirebase(r);
showToast("Saved! 🍸");
closeModal();
}
function showToast(msg) {
var t = document.getElementById("toast");
t.textContent = msg;
t.classList.add("show");
setTimeout(function() { t.classList.remove("show"); }, 2000);
}
init();
</script>
</body>
